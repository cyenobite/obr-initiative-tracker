<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initiative Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1614;
      --bg2: #231f1c; --bg3: #2e2825;
      --surface: #332d29; --border: #4a3f38; --border2: #5c4e45;
      --text: #e8ddd5; --text2: #a89890; --text3: #9a8a80;
      --accent: #c0392b; --accent2: #e74c3c;
      --gold: #c9a84c; --gold2: #e8c56a;
      --pause: #7a5c2e; --pause2: #c9943c;
      --green: #2e6b4a; --green2: #5DCAA5;
      --cn: #4a3a7a; --cn2: #9b7fd4;
      --active-border: #c0392b;
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
    }
    .wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 420px;
      margin: 0 auto;
      overflow: hidden;
    }
    .top-bar {
      flex-shrink: 0;
      padding: 14px 16px 10px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
    }
    .header { display: flex; align-items: center; justify-content: space-between; }
    .title { font-size: 18px; font-weight: 500; color: var(--gold); letter-spacing: 0.04em; }
    .round-badge { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; padding: 6px 14px; font-size: 13px; color: var(--text2); }
    .round-badge span { color: var(--gold2); font-weight: 500; font-size: 15px; }
    .pause-hint { text-align: center; font-size: 12px; color: var(--pause2); margin-top: 8px; padding: 7px 12px; background: #2a2010; border: 0.5px solid var(--pause); border-radius: 6px; }
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .combatant-list { display: flex; flex-direction: column; gap: 6px; }
    .edit-hint { font-size: 10px; color: var(--text3); text-align: center; margin-bottom: 6px; letter-spacing: 0.02em; }
    .combatant {
      display: grid;
      grid-template-columns: 10px 42px 1fr auto auto auto;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      position: relative;
    }
    .combatant:hover { border-color: var(--border2); background: #2a2320; }
    .combatant.active { background: #2a1f1a; border-color: var(--active-border); border-width: 1px; }
    .combatant.active .init-box { color: var(--accent2); border-color: var(--accent); }
    .combatant.active .cname { color: var(--gold2); }
    .combatant.paused-click:hover { border-color: var(--pause2); background: #2a2318; }
    .left-dot { width: 8px; height: 8px; background: var(--accent2); border-radius: 50%; opacity: 0; flex-shrink: 0; }
    .combatant.active .left-dot { opacity: 1; }
    .init-box {
      width: 42px; height: 36px; background: var(--surface);
      border: 0.5px solid var(--border2); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 500; color: var(--gold); flex-shrink: 0;
      cursor: text; transition: border-color 0.15s, background 0.15s;
    }
    .init-box:hover { border-color: var(--gold); background: #3a3020; }
    .init-input {
      width: 42px; height: 36px; background: #3a3020;
      border: 1px solid var(--gold); border-radius: 6px;
      color: var(--gold2); font-size: 13px; font-weight: 500;
      text-align: center; outline: none; flex-shrink: 0;
      font-family: inherit;
      -moz-appearance: textfield; padding: 0 2px;
    }
    .init-input::-webkit-outer-spin-button,
    .init-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .cname { font-size: 15px; font-weight: 500; color: var(--text); }
    .ctype-wrap { display: flex; align-items: center; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
    .ctype-badge {
      font-size: 11px; font-weight: 600; padding: 1px 7px;
      border-radius: 4px; border: 0.5px solid transparent;
      cursor: pointer; transition: opacity 0.15s, border-color 0.15s;
      letter-spacing: 0.03em; white-space: nowrap;
    }
    .ctype-badge:hover { opacity: 0.8; border-color: currentColor; }
    .ctype-select {
      font-size: 11px; font-weight: 600;
      background: #1a1614; border: 1px solid var(--gold);
      border-radius: 4px; color: var(--gold2); outline: none;
      padding: 1px 4px; cursor: pointer; font-family: inherit;
    }
    .ctype-select option { background: #1a1614; color: var(--text); }
    .active-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
    .cn-btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface); border: 0.5px solid var(--border2);
      border-radius: 6px; padding: 4px 8px; cursor: pointer;
      color: var(--text3); font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0; white-space: nowrap; height: 28px;
    }
    .cn-btn:hover { border-color: var(--cn2); color: var(--cn2); }
    .cn-btn.cn-on { background: var(--cn); border-color: var(--cn2); color: var(--cn2); }
    .cn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cn2); opacity: 0; flex-shrink: 0; transition: opacity 0.15s; }
    .cn-btn.cn-on .cn-dot { opacity: 1; }
    .cn-turns { font-size: 11px; color: var(--cn2); background: #2a1e3a; border: 0.5px solid var(--cn); border-radius: 4px; padding: 2px 6px; min-width: 20px; text-align: center; font-weight: 600; }
    .turn-dot { width: 8px; height: 8px; background: var(--accent2); border-radius: 50%; opacity: 0; flex-shrink: 0; }
    .combatant.active .turn-dot { opacity: 1; }
    .remove-btn {
      background: none; border: 0.5px solid transparent; border-radius: 6px;
      width: 28px; height: 28px; cursor: pointer; color: var(--text3);
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s; flex-shrink: 0;
    }
    .remove-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .confirm-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(20,10,10,0.96); border-radius: 8px;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 10; padding: 0 16px;
    }
    .confirm-overlay.show { display: flex; }
    .confirm-msg { font-size: 13px; color: #e8ddd5; flex: 1; }
    .confirm-msg strong { color: var(--gold2); }
    .btn-confirm-remove { background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: 13px; font-weight: 500; padding: 7px 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .btn-confirm-remove:hover { background: var(--accent2); }
    .btn-confirm-cancel { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 6px; color: var(--text2); font-size: 13px; padding: 7px 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .btn-confirm-cancel:hover { border-color: var(--text2); color: var(--text); }
    .empty-state { text-align: center; padding: 24px 0; color: var(--text3); font-size: 14px; border: 0.5px dashed var(--border); border-radius: 8px; }
    .bottom-fixed {
      flex-shrink: 0;
      border-top: 0.5px solid var(--border);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #1a1614;
    }
    .add-area { background: rgba(0,0,0,0.8); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px; }
    .add-row { display: grid; grid-template-columns: 1fr 70px 90px; gap: 8px; align-items: end; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; color: #c8b8b0; text-transform: uppercase; letter-spacing: 0.06em; }
    .field input, .field select {
      background: #1a1614; border: 0.5px solid var(--border2); border-radius: 6px;
      color: #e8ddd5; font-size: 14px; padding: 8px 10px; height: 34px;
      width: 100%; outline: none; font-family: inherit;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus { border-color: var(--gold); }
    .field input::placeholder { color: #6a5a52; }
    .field select option { background: #1a1614; color: #e8ddd5; }
    .add-btn {
      display: block; width: 100%;
      background: #7a3a28; border: 1px solid #c0392b; border-radius: 6px;
      color: #f0c0b0; font-size: 14px; font-weight: 500;
      padding: 0 16px; height: 36px; cursor: pointer;
      transition: background 0.15s, color 0.15s; margin-top: 8px;
    }
    .add-btn:hover { background: #c0392b; color: #fff; }
    .bottom-bar { display: flex; align-items: center; gap: 8px; }
    .actions { display: grid; gap: 8px; flex: 1; }
    .btn-start { background: var(--green); border: none; border-radius: 8px; color: var(--green2); font-size: 14px; font-weight: 500; padding: 10px 8px; cursor: pointer; transition: background 0.15s; }
    .btn-start:hover { background: #3a7a58; }
    .btn-next { background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 500; padding: 10px 8px; cursor: pointer; transition: background 0.15s; }
    .btn-next:hover { background: var(--accent2); }
    .btn-pause { background: var(--pause); border: none; border-radius: 8px; color: var(--pause2); font-size: 14px; font-weight: 500; padding: 10px 8px; cursor: pointer; transition: background 0.15s; }
    .btn-pause:hover { background: #9a7a3e; color: #f0c060; }
    .btn-resume { background: var(--green); border: none; border-radius: 8px; color: var(--green2); font-size: 14px; font-weight: 500; padding: 10px 8px; cursor: pointer; transition: background 0.15s; }
    .btn-resume:hover { background: #3a7a58; }
    .btn-reset { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text2); font-size: 14px; padding: 10px 8px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
    .btn-reset:hover { border-color: var(--text2); color: var(--text); }
    .sound-toggle {
      background: var(--surface); border: 0.5px solid var(--border2);
      border-radius: 8px; width: 40px; height: 40px; flex-shrink: 0;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: border-color 0.15s, background 0.15s;
      align-self: stretch;
    }
    .sound-toggle:hover { border-color: var(--text2); }
    .sound-toggle.muted { border-color: var(--accent); background: #2a1a18; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div class="header">
      <div class="title">Initiative Tracker</div>
      <div class="round-badge">Round <span id="round-num">1</span></div>
    </div>
    <div id="pause-hint" class="pause-hint" style="display:none">
      Paused — click any combatant to set active turn, or add combatants below
    </div>
  </div>
  <div class="scroll-area">
    <div class="combatant-list" id="combatant-list"></div>
  </div>
  <div class="bottom-fixed">
    <div class="add-area">
      <div class="add-row">
        <div class="field">
          <label>Name</label>
          <input type="text" id="inp-name" placeholder="Combatant name" maxlength="30">
        </div>
        <div class="field">
          <label>Initiative</label>
          <input type="number" id="inp-init" min="1" max="30" step="0.1">
        </div>
        <div class="field">
          <label>Type</label>
          <select id="inp-type">
            <option value="Player">Player</option>
            <option value="Monster">Monster</option>
            <option value="NPC">NPC</option>
          </select>
        </div>
      </div>
      <button class="add-btn" onclick="addCombatant()">Add to combat</button>
    </div>
    <div class="bottom-bar">
      <div class="actions" id="action-bar"></div>
      <button class="sound-toggle" id="sound-toggle" onclick="toggleSound()" title="Toggle sound">🔔</button>
    </div>
  </div>
</div>
<script>
  let combatants = [];
  let activeIndex = 0;
  let round = 1;
  let state = 'idle';
  let confirmingId = null;
  let editingInitId = null;
  let editingTypeId = null;
  let soundOn = true;

  const typeColors = { Player: '#5DCAA5', Monster: '#e74c3c', NPC: '#c9a84c' };
  const typeBg = { Player: '#1a3a2a', Monster: '#3a1a18', NPC: '#3a2e10' };

  function randInit() { return Math.floor(Math.random() * 20) + 1; }
  function freshRoll() { document.getElementById('inp-init').value = randInit(); }
  function formatInit(val) { return Number.isInteger(val) ? val.toString() : val.toFixed(1); }
  function parseInit(str) {
    const val = parseFloat(str);
    if (isNaN(val)) return null;
    return Math.round(val * 10) / 10;
  }

  function toggleSound() {
    soundOn = !soundOn;
    const btn = document.getElementById('sound-toggle');
    btn.textContent = soundOn ? '🔔' : '🔕';
    btn.classList.toggle('muted', !soundOn);
  }

  function playDing() {
    if (!soundOn) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.6);
    } catch(e) {}
  }

  function sortCombatants() {
    const active = combatants[activeIndex];
    combatants.sort((a, b) => b.init - a.init || a.name.localeCompare(b.name));
    if (active) activeIndex = combatants.findIndex(c => c.id === active.id);
    if (activeIndex < 0) activeIndex = 0;
  }

  function addCombatant() {
    const name = document.getElementById('inp-name').value.trim();
    const init = parseInit(document.getElementById('inp-init').value);
    const type = document.getElementById('inp-type').value;
    if (!name || init === null) return;
    combatants.push({ name, init, type, id: Date.now() + Math.random(), cn: false, cnTurns: 0 });
    sortCombatants();
    document.getElementById('inp-name').value = '';
    freshRoll();
    confirmingId = null;
    render();
    setTimeout(() => {
      const area = document.querySelector('.scroll-area');
      if (area) area.scrollTop = area.scrollHeight;
    }, 30);
  }

  function removeCombatant(id) {
    const idx = combatants.findIndex(c => c.id === id);
    const wasActive = idx === activeIndex;
    combatants = combatants.filter(c => c.id !== id);
    confirmingId = null; editingInitId = null; editingTypeId = null;
    if (combatants.length === 0) { activeIndex = 0; state = 'idle'; }
    else {
      if (idx < activeIndex) activeIndex = Math.max(0, activeIndex - 1);
      else if (wasActive) activeIndex = activeIndex % combatants.length;
      if (activeIndex >= combatants.length) activeIndex = 0;
    }
    render();
  }

  function toggleCN(id) {
    const c = combatants.find(c => c.id === id);
    if (!c) return;
    c.cn = !c.cn;
    if (!c.cn) c.cnTurns = 0;
    render();
  }

  function requestRemove(id) {
    confirmingId = (confirmingId === id) ? null : id;
    editingInitId = null; editingTypeId = null;
    render();
  }

  function startEditInit(id) {
    editingInitId = id; editingTypeId = null; confirmingId = null;
    render();
    setTimeout(() => {
      const inp = document.getElementById('init-edit-' + id);
      if (inp) { inp.focus(); inp.select(); }
    }, 20);
  }

  function commitInitEdit(id) {
    const inp = document.getElementById('init-edit-' + id);
    if (!inp) return;
    const val = parseInit(inp.value);
    const c = combatants.find(c => c.id === id);
    if (c && val !== null && val >= 1 && val <= 30) { c.init = val; sortCombatants(); }
    editingInitId = null;
    render();
  }

  function startEditType(id) {
    editingTypeId = id; editingInitId = null; confirmingId = null;
    render();
    setTimeout(() => {
      const sel = document.getElementById('type-edit-' + id);
      if (sel) sel.focus();
    }, 20);
  }

  function commitTypeEdit(id) {
    const sel = document.getElementById('type-edit-' + id);
    if (!sel) return;
    const c = combatants.find(c => c.id === id);
    if (c) c.type = sel.value;
    editingTypeId = null;
    render();
  }

  function startCombat() {
    if (combatants.length === 0) return;
    state = 'active'; activeIndex = 0; round = 1;
    document.getElementById('round-num').textContent = '1';
    confirmingId = null; editingInitId = null; editingTypeId = null;
    render(); scrollToActive();
  }

  function nextTurn() {
    if (state !== 'active' || combatants.length === 0) return;
    const current = combatants[activeIndex];
    if (current && current.cn) current.cnTurns++;
    activeIndex = (activeIndex + 1) % combatants.length;
    if (activeIndex === 0) { round++; document.getElementById('round-num').textContent = round; }
    playDing();
    render(); scrollToActive();
  }

  function scrollToActive() {
    setTimeout(() => {
      const area = document.querySelector('.scroll-area');
      const active = area && area.querySelector('.combatant.active');
      if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }, 30);
  }

  function pauseCombat() { state = 'paused'; render(); }
  function resumeCombat() { state = 'active'; render(); }

  function resetCombat() {
    const keep = combatants.filter(c => c.type === 'Player' || c.type === 'NPC');
    keep.forEach(c => { c.init = randInit(); c.cn = false; c.cnTurns = 0; });
    combatants = keep;
    activeIndex = 0; round = 1; state = 'idle';
    confirmingId = null; editingInitId = null; editingTypeId = null;
    sortCombatants();
    document.getElementById('round-num').textContent = '1';
    render();
  }

  function selectCombatant(idx, id) {
    if (editingInitId !== null || editingTypeId !== null) return;
    if (confirmingId !== null) { confirmingId = null; render(); return; }
    if (state === 'paused') { activeIndex = idx; render(); return; }
    requestRemove(id);
  }

  function renderActionBar() {
    const bar = document.getElementById('action-bar');
    bar.innerHTML = '';
    if (state === 'idle') {
      bar.style.gridTemplateColumns = '1fr auto';
      const s = document.createElement('button'); s.className = 'btn-start'; s.textContent = 'Start combat'; s.onclick = startCombat;
      const r = document.createElement('button'); r.className = 'btn-reset'; r.textContent = 'Reset'; r.onclick = resetCombat;
      bar.appendChild(s); bar.appendChild(r);
    } else if (state === 'active') {
      bar.style.gridTemplateColumns = '1fr 1fr 1fr';
      const n = document.createElement('button'); n.className = 'btn-next'; n.textContent = 'Next turn \u203a'; n.onclick = nextTurn;
      const p = document.createElement('button'); p.className = 'btn-pause'; p.textContent = 'Pause'; p.onclick = pauseCombat;
      const r = document.createElement('button'); r.className = 'btn-reset'; r.textContent = 'Reset'; r.onclick = resetCombat;
      bar.appendChild(n); bar.appendChild(p); bar.appendChild(r);
    } else {
      bar.style.gridTemplateColumns = '1fr auto';
      const res = document.createElement('button'); res.className = 'btn-resume'; res.textContent = 'Resume combat'; res.onclick = resumeCombat;
      const r = document.createElement('button'); r.className = 'btn-reset'; r.textContent = 'Reset'; r.onclick = resetCombat;
      bar.appendChild(res); bar.appendChild(r);
    }
  }

  function render() {
    const list = document.getElementById('combatant-list');
    document.getElementById('pause-hint').style.display = state === 'paused' ? 'block' : 'none';
    if (combatants.length === 0) {
      list.innerHTML = '<div class="empty-state">No combatants yet — add some below</div>';
      renderActionBar(); return;
    }
    list.innerHTML = '';
    const hint = document.createElement('div');
    hint.className = 'edit-hint';
    hint.textContent = 'Tip: click initiative number or type label to edit';
    list.appendChild(hint);
    combatants.forEach((c, i) => {
      const isActive = (state === 'active' || state === 'paused') && i === activeIndex;
      const isConfirming = confirmingId === c.id;
      const isEditingInit = editingInitId === c.id;
      const isEditingType = editingTypeId === c.id;
      const div = document.createElement('div');
      let cls = 'combatant';
      if (isActive) cls += ' active';
      if (state === 'paused') cls += ' paused-click';
      div.className = cls;
      div.onclick = () => selectCombatant(i, c.id);
      const initCell = isEditingInit
        ? `<input class="init-input" id="init-edit-${c.id}" type="number" min="1" max="30" step="0.1" value="${formatInit(c.init)}"
             onclick="event.stopPropagation()"
             onkeydown="if(event.key==='Enter'){event.stopPropagation();commitInitEdit(${c.id});}if(event.key==='Escape'){editingInitId=null;render();}"
             onblur="commitInitEdit(${c.id})">`
        : `<div class="init-box" onclick="event.stopPropagation(); startEditInit(${c.id})" title="Click to edit">${formatInit(c.init)}</div>`;
      const typeCell = isEditingType
        ? `<select class="ctype-select" id="type-edit-${c.id}"
             onclick="event.stopPropagation()"
             onchange="commitTypeEdit(${c.id})"
             onblur="commitTypeEdit(${c.id})"
             onkeydown="if(event.key==='Escape'){editingTypeId=null;render();}">
             <option value="Player" ${c.type==='Player'?'selected':''}>Player</option>
             <option value="Monster" ${c.type==='Monster'?'selected':''}>Monster</option>
             <option value="NPC" ${c.type==='NPC'?'selected':''}>NPC</option>
           </select>`
        : `<span class="ctype-badge"
             style="color:${typeColors[c.type]||'#a89890'}; background:${typeBg[c.type]||'#2a2a2a'};"
             onclick="event.stopPropagation(); startEditType(${c.id})"
             title="Click to change type">${c.type}</span>`;
      const activeLabel = isActive && state === 'active'
        ? `<span class="active-label" style="color:var(--accent)">&nbsp;&middot;&nbsp; Active</span>` : '';
      const deckLabel = isActive && state === 'paused'
        ? `<span class="active-label" style="color:var(--pause2)">&nbsp;&middot;&nbsp; On deck</span>` : '';
      div.innerHTML = `
        <div class="left-dot"></div>
        ${initCell}
        <div>
          <div class="cname">${c.name}</div>
          <div class="ctype-wrap">
            ${typeCell}${activeLabel}${deckLabel}
          </div>
        </div>
        <button class="cn-btn${c.cn ? ' cn-on' : ''}" onclick="event.stopPropagation(); toggleCN(${c.id})" title="Toggle Concentration">
          <div class="cn-dot"></div>CN
        </button>
        ${c.cn ? `<span class="cn-turns">${c.cnTurns}</span>` : '<span></span>'}
        <div class="turn-dot"></div>
        <button class="remove-btn" onclick="event.stopPropagation(); requestRemove(${c.id})" title="Remove">&#x2715;</button>
        <div class="confirm-overlay${isConfirming ? ' show' : ''}">
          <span class="confirm-msg">Remove <strong>${c.name}</strong>?</span>
          <button class="btn-confirm-remove" onclick="event.stopPropagation(); removeCombatant(${c.id})">Remove</button>
          <button class="btn-confirm-cancel" onclick="event.stopPropagation(); confirmingId=null; render()">Cancel</button>
        </div>
      `;
      list.appendChild(div);
    });
    renderActionBar();
  }

  document.getElementById('inp-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inp-init').focus();
  });
  document.getElementById('inp-init').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCombatant();
  });

  freshRoll();
  render();
</script>
</body>
</html>
